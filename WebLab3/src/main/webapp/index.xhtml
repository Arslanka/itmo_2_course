<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
>
<h:head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebLab3</title>

</h:head>

<body onload="init()">
<table class="wrapper">
    <colgroup>
        <col span="1" style="width: 27%;" />
        <col span="1" style="width: 30%;" />
        <col span="1" style="width: 43%;" />
    </colgroup>
    <tbody>
    <tr>
        <td class="header" colspan="3">
            Arslanka
            P32121
        </td>
    </tr>
    <tr>
        <td class='horizontal-separator' colspan='3'></td>
    </tr>
    <tr>
        <td class="user_input">
            <h:form id="form">
                <table class="values">
                    <colgroup>
                        <col span="1" style="width: 25%;" />
                        <col span="1" style="width: 75%;" />
                    </colgroup>
                    <tr class="x_value">
                        <td>
                            <h:outputLabel for="x_value">Choose X:</h:outputLabel>
                        </td>
                        <td class="btn_group">
                            <h:selectOneRadio id="x_value" required="true" value="#{point2D.x}"
                                    requiredMessage="The X coordinate is not selected!">
                                <f:selectItem itemValue="-4" itemLabel="-4" />
                                <f:selectItem itemValue="-3" itemLabel="-3" />
                                <f:selectItem itemValue="-2" itemLabel="-2" />
                                <f:selectItem itemValue="-1" itemLabel="-1" />
                                <f:selectItem itemValue="0" itemLabel="0" />
                                <f:selectItem itemValue="1" itemLabel="1" />
                                <f:selectItem itemValue="2" itemLabel="2" />
                                <f:selectItem itemValue="3" itemLabel="3" />
                                <f:selectItem itemValue="4" itemLabel="4" />
                            </h:selectOneRadio>
                        </td>
                    </tr>

                    <tr class="y_value">
                        <td>
                            <h:outputLabel for="y_value">Choose Y:</h:outputLabel>
                        </td>
                        <td>
                            <h:inputText required="true" requiredMessage="The Y coordinate is not selected!" type="text"
                                    name="y" id="y_value" value="#{point2D.y}">
                            </h:inputText>
                        </td>
                    </tr>

                    <tr class="r_value">
                        <td>
                            <h:outputLabel for="r_value">Choose R:</h:outputLabel>
                        </td>
                        <td>
                            <h:inputText required="true" requiredMessage="The Y coordinate is not selected!" type="text"
                                    name="y" id="r_value" value="#{requestBean.radius}">
                            </h:inputText>
                        </td>
                    </tr>

                    <tr class="buttons">
                        <td colspan="2">
                            <h:commandButton id="submit" value="Check hit"
                                    action="#{RequestRepository.insert()}">
                            </h:commandButton>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <h:message for="x_value" id="x_error_message" />
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <h:message for="y_value" id="y_error_message" />
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <h:message for="r_value" id="r_error_message" />
                        </td>
                    </tr>
                </table>
            </h:form>
        </td>
        <td class="table">
            <h:outputLabel id="result_table" value="#{RequestRepository.findAllRequests()}"
                    var="hitResult"></h:outputLabel>
        </td>
    </tr>
    </tbody>
</table>

</body>

</html>
